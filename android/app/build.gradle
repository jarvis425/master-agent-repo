apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: '../vendor/flutter/plugins/flutter.gradle'
android {
  compileSdkVersion 34
  defaultConfig {
    applicationId "com.example.master_agent_repo"
    minSdkVersion 21
    targetSdkVersion 34
    multiDexEnabled true
    versionCode 1
    versionName "1.0"
  }
  buildTypes {
    release {
      signingConfig signingConfigs.debug
      minifyEnabled false
      shrinkResources false
    }
  }
}
